<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoArch Agent · Terminal</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0A0B10;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== FONDO ANIMADO ===== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 200, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 255, 200, 0.05) 0%, transparent 50%),
                #0A0B10;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(10, 11, 16, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.05);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 28px;
            color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, #00e5ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-badge {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 229, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-badge i { font-size: 14px; }

        /* ===== TARJETAS ===== */
        .grid-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) { .grid-cards { grid-template-columns: 1fr; } }

        .card {
            background: rgba(15, 17, 26, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-radius: 20px;
            padding: 24px 28px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(0, 200, 255, 0.2), rgba(168, 85, 247, 0.2));
            border-radius: 20px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card:hover::before { opacity: 1; }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 200, 255, 0.4);
            box-shadow: 0 12px 48px rgba(0, 200, 255, 0.1);
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i { font-size: 18px; }
        .card-title .glow { text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }

        /* ===== ESTADÍSTICAS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-value.blue { color: #00e5ff; text-shadow: 0 0 30px rgba(0, 229, 255, 0.2); }
        .stat-value.green { color: #4ade80; text-shadow: 0 0 30px rgba(74, 222, 128, 0.2); }
        .stat-value.yellow { color: #facc15; text-shadow: 0 0 30px rgba(250, 204, 21, 0.2); }

        /* ===== MODO LEGENDARIO ===== */
        .legendary-box {
            margin-top: 16px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 3px solid #a855f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .legendary-label {
            font-weight: 500;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .legendary-status {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        /* ===== CONTROLES ===== */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .control-item:hover { border-color: rgba(0, 200, 255, 0.2); }
        .control-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-label i { font-size: 16px; color: #00e5ff; }
        .control-label span { font-size: 14px; }

        /* ===== BOTÓN TOGGLE FUTURISTA ===== */
        .toggle-btn {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .toggle-btn.active {
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
            border: 1px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }
        .toggle-btn.active:hover {
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
            transform: scale(1.02);
        }
        .toggle-btn.inactive {
            background: rgba(255, 0, 0, 0.08);
            color: #f87171;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }
        .toggle-btn.inactive:hover {
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1);
            transform: scale(1.02);
        }

        /* ===== TABLA ===== */
        .table-wrap {
            overflow-x: auto;
            margin-top: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 12px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #ccc;
        }
        tr:hover td { background: rgba(0, 200, 255, 0.03); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .logo-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- Fondo animado -->
    <div class="bg-animation"></div>

    <!-- Contenedor -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-microchip logo-icon"></i>
                <span class="logo-text">CryptoArch Agent</span>
            </div>
            <div class="user-badge">
                <i class="fas fa-user-astronaut"></i>
                <span id="chat-id-display">Cargando...</span>
            </div>
        </header>

        <!-- Grid Principal -->
        <div class="grid-cards">
            <!-- Tarjeta Estadísticas -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-chart-pie glow"></i>
                    <span class="glow">ESTADÍSTICAS DE GUERRA</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Operaciones</div>
                        <div class="stat-value blue" id="total-trades">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value green" id="win-rate">0%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">PnL</div>
                        <div class="stat-value yellow" id="pnl">$0.00</div>
                    </div>
                </div>
                <div class="legendary-box">
                    <span class="legendary-label">
                        <i class="fas fa-crown" style="color:#a855f7;"></i> Modo Legendario
                    </span>
                    <span class="legendary-status" id="legendary-mode">🔒 Bloqueado</span>
                </div>
            </div>

            <!-- Tarjeta Controles -->
            <div class="card">
                <div class="card-title">
                    <i class="fas fa-sliders-h glow"></i>
                    <span class="glow">CONTROL DE ARMAS</span>
                </div>
                <div class="control-group">
                    <div class="control-item">
                        <span class="control-label">
                            <i class="fas fa-crosshairs"></i>
                            <span>Sniper X</span>
                        </span>
                        <button id="sniper-toggle" class="toggle-btn inactive">Inactivo</button>
                    </div>
                    <div class="control-item">
                        <span class="control-label">
                            <i class="fas fa-whale"></i>
                            <span>Copy Trading</span>
                        </span>
                        <button id="copy-toggle" class="toggle-btn inactive">Inactivo</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tarjeta Historial -->
        <div class="card" style="margin-top: 20px;">
            <div class="card-title">
                <i class="fas fa-history glow"></i>
                <span class="glow">HISTORIAL DE OPERACIONES</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Activo</th>
                            <th>Tipo</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Resultado</th>
                        </tr>
                    </thead>
                    <tbody id="trades-table">
                        <tr><td colspan="6" style="text-align:center; padding:20px; color:#666;">No hay operaciones registradas</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const chatId = "8355456581";

        // ==================== CARGAR DATOS ====================
        async function loadStats() {
            try {
                const res = await fetch(`/api/stats/${chatId}`);
                const data = await res.json();
                document.getElementById('total-trades').textContent = data.total_trades || 0;
                document.getElementById('win-rate').textContent = (data.win_rate || 0) + '%';
                document.getElementById('pnl').textContent = '$' + (data.pnl || 0).toFixed(2);
                document.getElementById('legendary-mode').textContent = data.legendary_mode ? '👑 Activado' : '🔒 Bloqueado';
                document.getElementById('chat-id-display').textContent = chatId;
            } catch(e) {
                console.error('Error loading stats:', e);
            }
        }

        async function loadSettings() {
            try {
                const res = await fetch(`/api/settings/${chatId}`);
                const data = await res.json();
                
                const sniperBtn = document.getElementById('sniper-toggle');
                if (data.sniper && data.sniper.active) {
                    sniperBtn.textContent = 'Activo';
                    sniperBtn.className = 'toggle-btn active';
                } else {
                    sniperBtn.textContent = 'Inactivo';
                    sniperBtn.className = 'toggle-btn inactive';
                }

                const copyBtn = document.getElementById('copy-toggle');
                if (data.copy && data.copy.active) {
                    copyBtn.textContent = 'Activo';
                    copyBtn.className = 'toggle-btn active';
                } else {
                    copyBtn.textContent = 'Inactivo';
                    copyBtn.className = 'toggle-btn inactive';
                }
            } catch(e) {
                console.error('Error loading settings:', e);
            }
        }

        // ==================== TOGGLES ====================
        document.getElementById('sniper-toggle').addEventListener('click', async function() {
            const isActive = this.textContent === 'Activo';
            const newValue = !isActive;
            
            try {
                const res = await fetch('/api/update_sniper', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        field: 'active',
                        value: newValue
                    })
                });
                if (res.ok) {
                    this.textContent = newValue ? 'Activo' : 'Inactivo';
                    this.className = newValue ? 'toggle-btn active' : 'toggle-btn inactive';
                }
            } catch(e) {
                console.error('Error toggling sniper:', e);
            }
        });

        document.getElementById('copy-toggle').addEventListener('click', async function() {
            const isActive = this.textContent === 'Activo';
            const newValue = !isActive;
            
            try {
                const res = await fetch('/api/update_copy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        field: 'active',
                        value: newValue
                    })
                });
                if (res.ok) {
                    this.textContent = newValue ? 'Activo' : 'Inactivo';
                    this.className = newValue ? 'toggle-btn active' : 'toggle-btn inactive';
                }
            } catch(e) {
                console.error('Error toggling copy:', e);
            }
        });

        // ==================== INICIALIZAR ====================
        loadStats();
        loadSettings();

        // Recargar cada 30 segundos
        setInterval(loadStats, 30000);
        setInterval(loadSettings, 30000);
    </script>
</body>
</html>
